<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Modifier recette</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0b0f14">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zack & Snack">
</head>
<body>
<div class="container">

  <div class="card">
    <h2 class="card-title">✏️ Modifier recette</h2>

    <form method="post">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" name="name"
               value="{{ recipe.name }}"
               required>
      </div>

      <div class="form-group">
        <div class="toggle-row">
  <span>Recette active</span>

  <label class="switch">
    <input type="checkbox"
           name="is_active"
           {% if recipe.is_active %}checked{% endif %}>
    <span class="slider"></span>
  </label>
</div>

      </div>

      <div style="margin-top:15px; display:flex; gap:10px;">
        <button class="btn" type="submit">
          Enregistrer
        </button>

        <a class="btn secondary" href="/admin/recipes">
          Annuler
        </a>
      </div>
    </form>

  </div>

</div>
<script>
  // ==========================
  // PWA : service worker
  // ==========================
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/service-worker.js")
        .then((registration) => {
          console.log("Service worker enregistré :", registration.scope);
        })
        .catch((error) => {
          console.log("Erreur service worker :", error);
        });
    });
  }  
</script>
</body>
</html>
