<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zack & Snack – Admin Demain</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="container admin-tomorrow-page">

  {% include "admin/_tomorrow_top.html" %}

    <!-- CONFIGURATION RAPIDE -->
    <div class="two-col-layout">

      {% include "admin/_tomorrow_agents.html" %}
      {% include "admin/_tomorrow_offers.html" %}
      
    </div>

    {% include "admin/_tomorrow_bottom.html" %}

  </div>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script>
  function setupAutoHideSuccessMessages() {
    document.querySelectorAll(".js-auto-hide-success").forEach((el) => {
      if (el.dataset.processed === "true") return;

      el.dataset.processed = "true";

      setTimeout(() => {
        el.classList.add("fade-out");

        setTimeout(() => {
          el.remove();
        }, 300);
      }, 2000);
    });
  }

  function refreshTomorrowTopBlock() {
    const topBlock = document.getElementById("tomorrow-top-block");
    if (!topBlock) return;

    fetch("/admin/tomorrow/top")
      .then((response) => response.text())
      .then((html) => {
        topBlock.outerHTML = html;
      })
      .catch((error) => {
        console.error("Erreur refresh top block:", error);
      });
  }

  function refreshTomorrowBottomBlock() {
    const bottomBlock = document.getElementById("tomorrow-bottom-block");
    if (!bottomBlock) return;

    fetch("/admin/tomorrow/bottom")
      .then((response) => response.text())
      .then((html) => {
        bottomBlock.outerHTML = html;
      })
      .catch((error) => {
        console.error("Erreur refresh bottom block:", error);
      });
  }

  document.addEventListener("DOMContentLoaded", () => {
    setupAutoHideSuccessMessages();
  });

  document.body.addEventListener("htmx:afterSwap", (event) => {
    setupAutoHideSuccessMessages();

    const target = event.detail.target;
    if (!target) return;

    if (target.id === "tomorrow-agents-block" || target.id === "tomorrow-offers-block") {
      refreshTomorrowTopBlock();
      refreshTomorrowBottomBlock();
    }
  });
</script>
</body>
</html>
