<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zack & Snack – Connexion Admin</title>
  <link rel="stylesheet" href="/static/css/app.css?v=login-v3">
</head>
<body class="admin-login-page">
  <div class="admin-login-shell">
    <div class="admin-login-card">

      <div class="admin-login-brand">
        <div class="admin-login-brand__icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="28" height="28">
            <path d="M32 6 C20 6 10 18 10 30 c0 12 10 22 22 22 s22-10 22-22 C54 18 44 6 32 6Z" fill="#ffffff" opacity="0.95"/>
            <circle cx="32" cy="32" r="8" fill="#facc15"></circle>
          </svg>
        </div>

        <div>
          <div class="admin-login-brand__title">Zack & Snack</div>
          <div class="admin-login-brand__subtitle">Cockpit administrateur</div>
        </div>
      </div>

      <div class="admin-login-head">
        <h1>Connexion Admin</h1>
        <p>Accès réservé à la gestion du petit-déjeuner de demain.</p>
      </div>

      {% if error %}
        <div class="admin-login-alert">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="/admin/login" class="admin-login-form">
        <div class="form-group">
          <label for="username">Utilisateur</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            autofocus
            placeholder="Nom d’utilisateur"
          >
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>

          <div class="password-field">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              placeholder="Mot de passe"
            >

            <button
              type="button"
              class="password-toggle"
              aria-label="Afficher le mot de passe"
              onclick="togglePasswordVisibility()"
            >
              👁️
            </button>
          </div>
        </div>

        <button class="btn admin-login-submit" type="submit">
          Se connecter
        </button>
      </form>

      <div class="admin-login-footer">
        <a href="/">← Retour à l’accueil</a>
      </div>
    </div>
  </div>

  <script>
    function togglePasswordVisibility() {
      const input = document.getElementById("password");
      const btn = document.querySelector(".password-toggle");

      if (!input || !btn) return;

      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "🙈";
      } else {
        input.type = "password";
        btn.textContent = "👁️";
      }
    }
  </script>
</body>
</html>
