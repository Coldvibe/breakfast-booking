<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – Agents</title>
  <style>
    body { font-family: system-ui; background:#0b0f14; color:#e8eef6; margin:0 }
    .wrap { max-width:900px; margin:auto; padding:16px }
    .card { background:#121a24; border:1px solid #1d2a3a; border-radius:16px; padding:16px; margin-bottom:16px }
    input, button { padding:10px; border-radius:10px; border:1px solid #24344a; background:#0b0f14; color:#e8eef6 }
    button { background:#2f81f7; border:none; font-weight:700; cursor:pointer }
    table { width:100%; border-collapse:collapse }
    th, td { padding:8px; border-bottom:1px solid #1d2a3a; text-align:left }
    .muted { opacity:.7 }
    .row { display:flex; gap:8px; flex-wrap:wrap }
    .badge { padding:4px 8px; border-radius:999px; font-size:12px }
    .on { background:#1f6feb }
    .off { background:#3a3f45 }
  </style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0b0f14">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zack & Snack">
</head>
<body>
<div class="wrap">

  <div class="card">
    <h2>➕ Ajouter un agent</h2>
    <form method="post" action="/admin/agents/add" class="row">
      <input name="name" placeholder="Nom" required>
      <input name="phone" placeholder="Téléphone (+32…)" required>
      <label class="muted">
        <input type="checkbox" name="whatsapp_optin"> WhatsApp autorisé
      </label>
      <button type="submit">Ajouter</button>
    </form>
  </div>

  <div class="card">
    <h2>👥 Agents</h2>
    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Téléphone</th>
          <th>WhatsApp</th>
          <th>Actif</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
{% for a in agents %}
  <tr>
    <form method="post" action="/admin/agents/update">
      <td>
        <input type="hidden" name="agent_id" value="{{ a['id'] }}">
        <input name="name" value="{{ a['name'] }}" required style="width:100%">
      </td>

      <td>
        <input name="phone" value="{{ a['phone'] }}" required style="width:100%">
      </td>

      <td>
        <label>
          <input type="checkbox" name="whatsapp_optin" {% if a['whatsapp_optin'] %}checked{% endif %}>
          Oui
        </label>
      </td>

      <td>
        <label>
          <input type="checkbox" name="is_active" {% if a['is_active'] %}checked{% endif %}>
          Actif
        </label>
      </td>

      <td class="row">
        <button type="submit">💾 Sauver</button>
    </form>

        <form method="post" action="/admin/agents/delete" onsubmit="return confirm('Désactiver cet agent ?');">
          <input type="hidden" name="agent_id" value="{{ a['id'] }}">
          <button type="submit" style="background:#3a3f45">🗑️ Désactiver</button>
        </form>
      </td>
  </tr>
{% endfor %}
</tbody>

    </table>
  </div>

  <div class="card">
    <a href="/" class="muted">← Retour à l’app</a>
  </div>

</div>
<script>
  // ==========================
  // PWA : service worker
  // ==========================
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/service-worker.js")
        .then((registration) => {
          console.log("Service worker enregistré :", registration.scope);
        })
        .catch((error) => {
          console.log("Erreur service worker :", error);
        });
    });
  }  
</script>
</body>
</html>
